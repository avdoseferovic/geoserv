name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish and deploy
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      release_tag: ${{ steps.release-tag.outputs.value }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release-tag
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          EVENT_RELEASE_TAG: ${{ github.ref_name }}
        run: |
          tag="${EVENT_RELEASE_TAG:-$INPUT_RELEASE_TAG}"
          if [ -z "$tag" ]; then
            echo "Release tag is required" >&2
            exit 1
          fi

          echo "value=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.release-tag.outputs.value }}
            type=raw,value=release

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dokploy:
    runs-on: ubuntu-latest
    needs: build-and-publish
    steps:
      - name: Trigger Dokploy redeploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}
          RELEASE_TAG: ${{ needs.build-and-publish.outputs.release_tag }}
        run: |
          test -n "$DOKPLOY_URL"
          test -n "$DOKPLOY_API_KEY"
          test -n "$DOKPLOY_APPLICATION_ID"

          curl --fail-with-body --silent --show-error \
            -X POST "${DOKPLOY_URL%/}/api/application.redeploy" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -d "{\"applicationId\":\"$DOKPLOY_APPLICATION_ID\",\"title\":\"Release $RELEASE_TAG\",\"description\":\"GitHub release deployment\"}"
