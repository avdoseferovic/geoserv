{{define "inn_edit"}}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 bg-opacity-50 backdrop-blur-sm p-4 overflow-y-auto">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col max-h-full">
    
    <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
      <h3 class="text-lg font-bold text-gray-900">
        {{if eq .BehaviorID 0}}Create New Vendor{{else}}Edit Vendor: <span class="text-indigo-600">{{.Name}}</span> (Vendor ID: {{.BehaviorID}}){{end}}
      </h3>
      <button type="button" class="text-gray-400 hover:text-gray-500 focus:outline-none transition-colors" onclick="closeModal()">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form hx-post="/ui/inns/{{.BehaviorID}}" {{if ne .BehaviorID 0}}hx-target="#inn-row-{{.BehaviorID}}" hx-swap="outerHTML"{{else}}hx-target="#main-content" hx-swap="innerHTML"{{end}} class="flex-1 overflow-y-auto">
      <div class="px-6 py-4 space-y-6">
        
        {{if eq .BehaviorID 0}}
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Vendor ID</label>
            <input type="number" name="new_id" value="0" class="w-full sm:w-1/3 rounded-md border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" data-lookup="vendor" required>
        </div>
        <hr class="border-gray-200">
        {{end}}

        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Inn Name</label>
            <input type="text" name="name" value="{{.Name}}" class="w-full sm:w-1/2 rounded-md border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 space-y-3">
                <h4 class="font-bold text-gray-800 text-sm border-b border-gray-200 pb-2">Spawn Location</h4>
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">Map</label>
                        <input type="number" name="spawn_map" value="{{.SpawnMap}}" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">X</label>
                        <input type="number" name="spawn_x" value="{{.SpawnX}}" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">Y</label>
                        <input type="number" name="spawn_y" value="{{.SpawnY}}" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                    </div>
                </div>
            </div>

            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 space-y-3">
                <h4 class="font-bold text-gray-800 text-sm border-b border-gray-200 pb-2">Sleep Location</h4>
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">Map</label>
                        <input type="number" name="sleep_map" value="{{.SleepMap}}" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">X</label>
                        <input type="number" name="sleep_x" value="{{.SleepX}}" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">Y</label>
                        <input type="number" name="sleep_y" value="{{.SleepY}}" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-indigo-50 p-4 rounded-lg border border-indigo-100 space-y-4">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="alt_spawn_enabled" value="true" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded" {{if .AltSpawnEnabled}}checked{{end}}>
                <span class="font-bold text-indigo-900 text-sm">Enable Alternate Spawn</span>
            </label>
            <div class="grid grid-cols-3 gap-3 max-w-lg">
                <div>
                    <label class="block text-xs text-indigo-700 mb-1 font-semibold uppercase">Alt Map</label>
                    <input type="number" name="alt_spawn_map" value="{{.AltSpawnMap}}" class="w-full rounded-md border border-indigo-200 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-indigo-700 mb-1 font-semibold uppercase">Alt X</label>
                    <input type="number" name="alt_spawn_x" value="{{.AltSpawnX}}" class="w-full rounded-md border border-indigo-200 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-indigo-700 mb-1 font-semibold uppercase">Alt Y</label>
                    <input type="number" name="alt_spawn_y" value="{{.AltSpawnY}}" class="w-full rounded-md border border-indigo-200 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
            </div>
        </div>

        <hr class="border-gray-200">

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-3">Questions & Answers</label>
          <div id="questions-list" class="space-y-3">
            {{range .Questions}}
            <div class="flex items-start gap-3 bg-gray-50 p-3 rounded-lg border border-gray-200">
                <div class="flex-1 space-y-2">
                    <div>
                        <input type="text" name="question" value="{{.Question}}" placeholder="Question..." class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none font-medium text-gray-900" required>
                    </div>
                    <div>
                        <input type="text" name="answer" value="{{.Answer}}" placeholder="Answer..." class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none text-indigo-700 font-medium bg-indigo-50/50" required>
                    </div>
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="text-red-500 hover:text-red-700 bg-red-50 px-3 py-2 rounded-md border border-red-100 hover:bg-red-100 transition-colors text-sm font-medium h-fit">Del</button>
            </div>
            {{end}}
          </div>
          
          <button type="button" onclick="addQuestion()" class="mt-4 flex items-center justify-center w-full py-2 border-2 border-dashed border-gray-300 rounded-lg text-sm font-medium text-gray-600 hover:border-indigo-500 hover:text-indigo-600 transition-colors bg-gray-50 hover:bg-indigo-50">
            + Add Question
          </button>
        </div>
      </div>
      
      <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 flex justify-end gap-3 sticky bottom-0 z-10">
        <button type="button" class="px-4 py-2 bg-white border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none transition-colors" onclick="closeModal()">Cancel</button>
        <button type="submit" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none transition-colors">Save Changes</button>
      </div>
    </form>
    
    <script>
        function addQuestion() {
            const div = document.createElement('div');
            div.className = 'flex items-start gap-3 bg-gray-50 p-3 rounded-lg border border-gray-200';
            div.innerHTML = `
                <div class="flex-1 space-y-2">
                    <div><input type="text" name="question" value="" placeholder="Question..." class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none font-medium text-gray-900" required></div>
                    <div><input type="text" name="answer" value="" placeholder="Answer..." class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none text-indigo-700 font-medium bg-indigo-50/50" required></div>
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="text-red-500 hover:text-red-700 bg-red-50 px-3 py-2 rounded-md border border-red-100 hover:bg-red-100 transition-colors text-sm font-medium h-fit">Del</button>
            `;
            document.getElementById('questions-list').appendChild(div); if(typeof initLookups === 'function') setTimeout(initLookups, 50);
        }
    </script>
  </div>
</div>
{{end}}
