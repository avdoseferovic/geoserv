{{define "drop_edit"}}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 bg-opacity-50 backdrop-blur-sm p-4 overflow-y-auto">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col max-h-full">
    
    <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
      <h3 class="text-lg font-bold text-gray-900">
        {{if eq .NpcID 0}}Create New Drop NPC{{else}}Edit Drop NPC: <span class="text-indigo-600">{{.NpcName}}</span> (ID: {{.NpcID}}){{end}}
      </h3>
      <button type="button" class="text-gray-400 hover:text-gray-500 focus:outline-none transition-colors" onclick="closeModal()">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Need to handle new row swap differently if ID was 0 -->
    <form hx-post="/ui/drops/{{.NpcID}}" 
          {{if ne .NpcID 0}}hx-target="#drop-row-{{.NpcID}}" hx-swap="outerHTML"{{else}}hx-target="#main-content" hx-swap="innerHTML"{{end}} 
          class="flex-1 overflow-y-auto">
      <div class="px-6 py-4 space-y-4">
        
        {{if eq .NpcID 0}}
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">NPC ID</label>
            <input type="number" name="new_id" value="0" class="w-full sm:w-1/3 rounded-md border border-gray-300 px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" data-lookup="npc" required>
        </div>
        <hr class="border-gray-200">
        {{end}}

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Drops Configuration</label>
          <div id="drops-list" class="space-y-3">
            {{range .Drops}}
            <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-lg border border-gray-200">
                <div class="w-1/4">
                  <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">Item ID</label>
                  <input type="number" name="item_id" value="{{.ItemID}}" data-lookup="item" data-name="{{.ItemName}}" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                </div>
                <div class="w-1/4">
                  <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">Min</label>
                  <input type="number" name="min_amount" value="{{.MinAmount}}" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                </div>
                <div class="w-1/4">
                  <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">Max</label>
                  <input type="number" name="max_amount" value="{{.MaxAmount}}" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                </div>
                <div class="w-1/4">
                  <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">Rate %</label>
                  <input type="number" name="rate" value="{{.Rate}}" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="mt-5 text-red-500 hover:text-red-700 bg-red-50 px-2 py-1.5 rounded-md border border-red-100 hover:bg-red-100 transition-colors text-sm font-medium">Del</button>
            </div>
            {{end}}
          </div>
          
          <button type="button" onclick="addDrop()" class="mt-4 flex items-center justify-center w-full py-2 border-2 border-dashed border-gray-300 rounded-lg text-sm font-medium text-gray-600 hover:border-indigo-500 hover:text-indigo-600 transition-colors bg-gray-50 hover:bg-indigo-50">
            + Add New Drop
          </button>
        </div>
      </div>
      
      <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 flex justify-end gap-3 sticky bottom-0">
        <button type="button" class="px-4 py-2 bg-white border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none transition-colors" onclick="closeModal()">Cancel</button>
        <button type="submit" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none transition-colors">Save Changes</button>
      </div>
    </form>
    
    <script>
        function addDrop() {
            const div = document.createElement('div');
            div.className = 'flex items-center gap-3 bg-gray-50 p-3 rounded-lg border border-gray-200';
            div.innerHTML = `
                <div class="w-1/4">
                  <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">Item ID</label>
                  <input type="number" name="item_id" value="0" data-lookup="item" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                </div>
                <div class="w-1/4">
                  <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">Min</label>
                  <input type="number" name="min_amount" value="1" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                </div>
                <div class="w-1/4">
                  <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">Max</label>
                  <input type="number" name="max_amount" value="1" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                </div>
                <div class="w-1/4">
                  <label class="block text-xs text-gray-500 mb-1 font-semibold uppercase">Rate %</label>
                  <input type="number" name="rate" value="100" class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:ring-indigo-500 focus:border-indigo-500 outline-none" required>
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="mt-5 text-red-500 hover:text-red-700 bg-red-50 px-2 py-1.5 rounded-md border border-red-100 hover:bg-red-100 transition-colors text-sm font-medium">Del</button>
            `;
            document.getElementById('drops-list').appendChild(div); if(typeof initLookups === 'function') setTimeout(initLookups, 50);
        }
    </script>
  </div>
</div>
{{end}}
